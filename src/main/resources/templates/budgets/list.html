<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Presupuestos</title>
</head>
<body>
<div layout:fragment="content">

    <!-- Header -->
    <div class="flex items-center justify-between mb-8">
        <div>
            <h1 class="text-2xl font-bold">Presupuestos</h1>
            <p class="text-[#94a3b8] text-sm mt-1">Controla tus límites de gasto por categoría</p>
        </div>
        <a th:href="@{/budgets/new}"
           class="px-4 py-2 rounded-lg bg-blue-700 hover:bg-blue-600 text-white text-sm font-semibold transition-colors">
            + Nuevo presupuesto
        </a>
    </div>

    <!-- Sin presupuestos -->
    <div th:if="${#lists.isEmpty(budgets)}"
         class="bg-[#1e293b] rounded-2xl border border-[#334155] p-12 text-center">
        <p class="text-[#94a3b8] text-sm">No hay presupuestos registrados.</p>
        <a th:href="@{/budgets/new}"
           class="inline-block mt-4 px-4 py-2 rounded-lg bg-blue-700 hover:bg-blue-600 text-white text-sm font-semibold transition-colors">
            Crear primer presupuesto
        </a>
    </div>

    <!-- Grid -->
    <div th:unless="${#lists.isEmpty(budgets)}"
         class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
        <div th:each="b : ${budgets}"
             class="bg-[#1e293b] rounded-2xl border border-[#334155] p-6 flex flex-col gap-4">

            <!-- Categoría y período -->
            <div class="flex items-start justify-between">
                <div>
                    <p class="font-semibold text-white" th:text="${b.category.name}"></p>
                    <p class="text-xs text-[#94a3b8] mt-0.5"
                       th:text="${b.period.name() == 'WEEKLY'} ? 'Semanal' : (${b.period.name() == 'MONTHLY'} ? 'Mensual' : 'Anual')"></p>
                </div>
                <span th:if="${b.month != null}"
                      class="text-xs px-2 py-1 rounded-full bg-[#334155] text-[#94a3b8]"
                      th:text="${b.month + '/' + b.year}"></span>
            </div>

            <!-- Límite -->
            <div>
                <p class="text-[#94a3b8] text-xs mb-1">Límite</p>
                <p class="text-2xl font-bold text-white"
                   th:text="${'S/ ' + #numbers.formatDecimal(b.limitAmount, 1, 2)}"></p>
            </div>

            <!-- Acciones -->
            <div class="flex items-center gap-2 pt-2 border-t border-[#334155]">
                <a th:href="@{/budgets/{id}/edit(id=${b.id})}"
                   class="flex-1 text-center px-3 py-2 rounded-lg text-sm text-[#94a3b8]
                          hover:text-white hover:bg-[#334155] transition-colors">
                    Editar
                </a>
                <form th:action="@{/budgets/{id}/delete(id=${b.id})}" method="post" class="flex-1">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit"
                            onclick="return confirm('¿Eliminar este presupuesto?')"
                            class="w-full px-3 py-2 rounded-lg text-sm text-red-400
                                   hover:text-white hover:bg-red-900/40 transition-colors">
                        Eliminar
                    </button>
                </form>
            </div>

        </div>
    </div>

</div>
</body>
</html>
