<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Presupuesto</title>
</head>
<body>
<div layout:fragment="content">

    <div class="mb-8">
        <h1 class="text-2xl font-bold"
            th:text="${budget.id != null} ? 'Editar presupuesto' : 'Nuevo presupuesto'"></h1>
        <p class="text-[#94a3b8] text-sm mt-1">Define un límite de gasto por categoría</p>
    </div>

    <div class="max-w-lg bg-[#1e293b] rounded-2xl border border-[#334155] p-8">
        <form th:action="${budget.id != null} ? @{/budgets/{id}/edit(id=${budget.id})} : @{/budgets/new}"
              method="post" th:object="${budget}" class="space-y-5">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <!-- Categoría -->
            <div>
                <label for="categoryId" class="block text-sm text-[#94a3b8] mb-1">Categoría</label>
                <select id="categoryId" name="categoryId" required
                        class="w-full px-4 py-2.5 rounded-lg bg-[#0f172a] border border-[#334155] text-[#e2e8f0]
                               focus:outline-none focus:border-blue-500 transition-colors text-sm">
                    <option value="" disabled selected>Selecciona una categoría</option>
                    <option th:each="cat : ${categories}"
                            th:value="${cat.id}"
                            th:text="${cat.name}"></option>
                </select>
            </div>

            <!-- Monto límite -->
            <div>
                <label for="limitAmount" class="block text-sm text-[#94a3b8] mb-1">Monto límite</label>
                <input type="number" id="limitAmount" th:field="*{limitAmount}" step="0.01" min="0.01" required
                       class="w-full px-4 py-2.5 rounded-lg bg-[#0f172a] border border-[#334155] text-[#e2e8f0]
                              placeholder-[#475569] focus:outline-none focus:border-blue-500 transition-colors text-sm"
                       placeholder="0.00"/>
            </div>

            <!-- Período -->
            <div>
                <label for="period" class="block text-sm text-[#94a3b8] mb-1">Período</label>
                <select id="period" th:field="*{period}" required
                        class="w-full px-4 py-2.5 rounded-lg bg-[#0f172a] border border-[#334155] text-[#e2e8f0]
                               focus:outline-none focus:border-blue-500 transition-colors text-sm">
                    <option value="" disabled>Selecciona un período</option>
                    <option th:each="p : ${periods}"
                            th:value="${p}"
                            th:text="${p.name() == 'WEEKLY'} ? 'Semanal' : (${p.name() == 'MONTHLY'} ? 'Mensual' : 'Anual')"></option>
                </select>
            </div>

            <!-- Mes y año -->
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label for="month" class="block text-sm text-[#94a3b8] mb-1">
                        Mes <span class="text-[#475569]">(opcional)</span>
                    </label>
                    <input type="number" id="month" th:field="*{month}" min="1" max="12"
                           class="w-full px-4 py-2.5 rounded-lg bg-[#0f172a] border border-[#334155] text-[#e2e8f0]
                                  placeholder-[#475569] focus:outline-none focus:border-blue-500 transition-colors text-sm"
                           placeholder="1-12"/>
                </div>
                <div>
                    <label for="year" class="block text-sm text-[#94a3b8] mb-1">
                        Año <span class="text-[#475569]">(opcional)</span>
                    </label>
                    <input type="number" id="year" th:field="*{year}" min="2000"
                           class="w-full px-4 py-2.5 rounded-lg bg-[#0f172a] border border-[#334155] text-[#e2e8f0]
                                  placeholder-[#475569] focus:outline-none focus:border-blue-500 transition-colors text-sm"
                           placeholder="2025"/>
                </div>
            </div>

            <!-- Botones -->
            <div class="flex gap-3 pt-2">
                <a th:href="@{/budgets}"
                   class="flex-1 text-center px-4 py-2.5 rounded-lg border border-[#334155] text-[#94a3b8]
                          hover:text-white hover:bg-[#334155] transition-colors text-sm font-semibold">
                    Cancelar
                </a>
                <button type="submit"
                        class="flex-1 px-4 py-2.5 rounded-lg bg-blue-700 hover:bg-blue-600 text-white
                               font-semibold transition-colors text-sm">
                    <span th:text="${budget.id != null} ? 'Guardar cambios' : 'Crear presupuesto'"></span>
                </button>
            </div>

        </form>
    </div>

</div>
</body>
</html>
