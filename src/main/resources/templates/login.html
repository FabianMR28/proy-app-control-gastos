<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white min-h-screen flex items-center justify-center">

<div class="w-full max-w-md bg-gray-900 p-8 rounded-xl shadow-lg">

    <h2 class="text-3xl font-bold text-blue-400 mb-6 text-center">
        🔐 Iniciar Sesión
    </h2>

    <!-- ERROR -->
    <div th:if="${param.error}" class="bg-red-500 text-white p-2 mb-4 rounded">
        Usuario o contraseña incorrectos
    </div>

    <!-- LOGOUT -->
    <div th:if="${param.logout}" class="bg-green-500 text-white p-2 mb-4 rounded">
        Sesión cerrada correctamente
    </div>

    <form th:action="@{/login}" method="post" class="space-y-4">

        <input type="text" name="username"
               placeholder="Usuario"
               class="w-full p-3 rounded-lg bg-black border border-blue-500 focus:outline-none">

        <input type="password" name="password"
               placeholder="Contraseña"
               class="w-full p-3 rounded-lg bg-black border border-blue-500 focus:outline-none">

        <button type="submit"
                class="w-full bg-blue-500 p-3 rounded-lg hover:bg-blue-600 font-semibold">
            Ingresar
        </button>

    </form>

    <p class="mt-6 text-center text-gray-400">
        ¿No tienes cuenta?
        <a th:href="@{/register}" class="text-blue-400 hover:underline">
            Regístrate
        </a>
    </p>

</div>

</body>
</html>
