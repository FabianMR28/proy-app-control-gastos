<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Historial</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white min-h-screen">

<div class="max-w-5xl mx-auto p-6">

    <h1 class="text-3xl font-bold text-blue-400 mb-6">
        📜 Historial de Gastos
    </h1>

    <!-- BUSCADOR -->
    <form method="get" action="/historial" class="mb-4 flex gap-2">
        <input type="text" name="texto"
               th:value="${texto}"
               placeholder="Buscar por descripción..."
               class="flex-1 p-3 rounded-lg bg-gray-900 border border-blue-500 focus:outline-none">

        <button class="bg-blue-500 px-4 rounded hover:bg-blue-600">
            Buscar
        </button>
    </form>

    <!-- CATEGORIAS -->
    <div class="flex flex-wrap gap-2 mb-6">

        <a href="/historial"
           class="px-3 py-1 rounded bg-blue-600">
            Todos
        </a>

        <a th:each="cat : ${categorias}"
           th:href="@{/historial(categoria=${cat.nombre}, texto=${texto})}"
           th:text="${cat.nombre}"
           class="px-3 py-1 rounded bg-gray-800 hover:bg-blue-600">
        </a>

    </div>

    <!-- TABLA -->
    <table class="w-full">
        <thead class="text-blue-400 border-b border-blue-500">
        <tr>
            <th class="p-2">Descripción</th>
            <th class="p-2">Monto</th>
            <th class="p-2">Categoría</th>
            <th class="p-2">Fecha</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="gasto : ${gastos}"
            class="border-b border-gray-800 hover:bg-gray-900">

            <td class="p-2" th:text="${gasto.descripcion}"></td>

            <td class="p-2 text-red-400 font-semibold"
                th:text="'S/ ' + ${gasto.monto}">
            </td>

            <td class="p-2"
                th:text="${gasto.categoria != null ? gasto.categoria.nombre : 'Sin categoría'}">
            </td>

            <td class="p-2"
                th:text="${#temporals.format(gasto.fecha, 'dd/MM/yyyy HH:mm')}">
            </td>
        </tr>
        </tbody>
    </table>

    <!-- VOLVER -->
    <div class="mt-6">
        <a href="/" class="text-blue-400 hover:underline">
            ← Volver
        </a>
    </div>

</div>

</body>
</html>
