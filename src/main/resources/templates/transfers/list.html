<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Transferencias</title>
</head>
<body>
<div layout:fragment="content">

    <!-- Header -->
    <div class="flex items-center justify-between mb-8">
        <div>
            <h1 class="text-2xl font-bold">Transferencias</h1>
            <p class="text-[#94a3b8] text-sm mt-1">Movimientos entre tus cuentas</p>
        </div>
        <a th:href="@{/transfers/new}"
           class="px-4 py-2 rounded-lg bg-blue-700 hover:bg-blue-600 text-white text-sm font-semibold transition-colors">
            + Nueva transferencia
        </a>
    </div>

    <!-- Sin transferencias -->
    <div th:if="${#lists.isEmpty(transfers)}"
         class="bg-[#1e293b] rounded-2xl border border-[#334155] p-12 text-center">
        <p class="text-[#94a3b8] text-sm">No hay transferencias registradas.</p>
        <a th:href="@{/transfers/new}"
           class="inline-block mt-4 px-4 py-2 rounded-lg bg-blue-700 hover:bg-blue-600 text-white text-sm font-semibold transition-colors">
            Registrar primera transferencia
        </a>
    </div>

    <!-- Tabla -->
    <div th:unless="${#lists.isEmpty(transfers)}"
         class="bg-[#1e293b] rounded-2xl border border-[#334155] overflow-hidden">
        <table class="w-full text-sm">
            <thead>
            <tr class="border-b border-[#334155] text-[#94a3b8]">
                <th class="text-left px-6 py-4 font-medium">Origen</th>
                <th class="text-left px-6 py-4 font-medium">Destino</th>
                <th class="text-left px-6 py-4 font-medium">Descripción</th>
                <th class="text-left px-6 py-4 font-medium">Fecha</th>
                <th class="text-right px-6 py-4 font-medium">Monto</th>
                <th class="text-right px-6 py-4 font-medium">Acciones</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="tr : ${transfers}"
                class="border-b border-[#334155] last:border-0 hover:bg-[#334155]/30 transition-colors">
                <td class="px-6 py-4 text-white font-medium" th:text="${tr.sourceAccount.name}"></td>
                <td class="px-6 py-4 text-white font-medium" th:text="${tr.destinationAccount.name}"></td>
                <td class="px-6 py-4 text-[#94a3b8]"
                    th:text="${tr.description != null && !tr.description.isEmpty()} ? ${tr.description} : '-'"></td>
                <td class="px-6 py-4 text-[#94a3b8]"
                    th:text="${#temporals.format(tr.date, 'dd/MM/yyyy')}"></td>
                <td class="px-6 py-4 text-right font-semibold text-blue-300"
                    th:text="${'S/ ' + #numbers.formatDecimal(tr.amount, 1, 2)}"></td>
                <td class="px-6 py-4 text-right">
                    <form th:action="@{/transfers/{id}/delete(id=${tr.id})}" method="post" class="inline">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button type="submit"
                                onclick="return confirm('¿Eliminar esta transferencia? Los saldos se revertirán.')"
                                class="px-3 py-1.5 rounded-lg text-red-400 hover:text-white hover:bg-red-900/40 transition-colors">
                            Eliminar
                        </button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

</div>
</body>
</html>
