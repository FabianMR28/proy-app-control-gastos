<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Nueva transferencia</title>
</head>
<body>
<div layout:fragment="content">

    <div class="mb-8">
        <h1 class="text-2xl font-bold">Nueva transferencia</h1>
        <p class="text-[#94a3b8] text-sm mt-1">Transfiere saldo entre tus cuentas</p>
    </div>

    <div class="max-w-lg bg-[#1e293b] rounded-2xl border border-[#334155] p-8">
        <form th:action="@{/transfers/new}" method="post"
              th:object="${transfer}" class="space-y-5">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <!-- Cuenta origen -->
            <div>
                <label for="sourceAccountId" class="block text-sm text-[#94a3b8] mb-1">Cuenta origen</label>
                <select id="sourceAccountId" name="sourceAccountId" required
                        class="w-full px-4 py-2.5 rounded-lg bg-[#0f172a] border border-[#334155] text-[#e2e8f0]
                               focus:outline-none focus:border-blue-500 transition-colors text-sm">
                    <option value="" disabled selected>Selecciona cuenta origen</option>
                    <option th:each="acc : ${accounts}"
                            th:value="${acc.id}"
                            th:text="${acc.name + ' (S/ ' + #numbers.formatDecimal(acc.balance, 1, 2) + ')'}"></option>
                </select>
            </div>

            <!-- Cuenta destino -->
            <div>
                <label for="destinationAccountId" class="block text-sm text-[#94a3b8] mb-1">Cuenta destino</label>
                <select id="destinationAccountId" name="destinationAccountId" required
                        class="w-full px-4 py-2.5 rounded-lg bg-[#0f172a] border border-[#334155] text-[#e2e8f0]
                               focus:outline-none focus:border-blue-500 transition-colors text-sm">
                    <option value="" disabled selected>Selecciona cuenta destino</option>
                    <option th:each="acc : ${accounts}"
                            th:value="${acc.id}"
                            th:text="${acc.name + ' (S/ ' + #numbers.formatDecimal(acc.balance, 1, 2) + ')'}"></option>
                </select>
            </div>

            <!-- Monto -->
            <div>
                <label for="amount" class="block text-sm text-[#94a3b8] mb-1">Monto</label>
                <input type="number" id="amount" th:field="*{amount}" step="0.01" min="0.01" required
                       class="w-full px-4 py-2.5 rounded-lg bg-[#0f172a] border border-[#334155] text-[#e2e8f0]
                              placeholder-[#475569] focus:outline-none focus:border-blue-500 transition-colors text-sm"
                       placeholder="0.00"/>
            </div>

            <!-- Descripción -->
            <div>
                <label for="description" class="block text-sm text-[#94a3b8] mb-1">
                    Descripción <span class="text-[#475569]">(opcional)</span>
                </label>
                <input type="text" id="description" th:field="*{description}"
                       class="w-full px-4 py-2.5 rounded-lg bg-[#0f172a] border border-[#334155] text-[#e2e8f0]
                              placeholder-[#475569] focus:outline-none focus:border-blue-500 transition-colors text-sm"
                       placeholder="Ej: Ahorro mensual"/>
            </div>

            <!-- Fecha -->
            <div>
                <label for="date" class="block text-sm text-[#94a3b8] mb-1">Fecha</label>
                <input type="date" id="date" th:field="*{date}" required
                       class="w-full px-4 py-2.5 rounded-lg bg-[#0f172a] border border-[#334155] text-[#e2e8f0]
                              focus:outline-none focus:border-blue-500 transition-colors text-sm"/>
            </div>

            <!-- Botones -->
            <div class="flex gap-3 pt-2">
                <a th:href="@{/transfers}"
                   class="flex-1 text-center px-4 py-2.5 rounded-lg border border-[#334155] text-[#94a3b8]
                          hover:text-white hover:bg-[#334155] transition-colors text-sm font-semibold">
                    Cancelar
                </a>
                <button type="submit"
                        class="flex-1 px-4 py-2.5 rounded-lg bg-blue-700 hover:bg-blue-600 text-white
                               font-semibold transition-colors text-sm">
                    Transferir
                </button>
            </div>

        </form>
    </div>

</div>
</body>
</html>
