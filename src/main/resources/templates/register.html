<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Registro</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white min-h-screen flex items-center justify-center">

<div class="w-full max-w-md bg-gray-900 p-8 rounded-xl shadow-lg">

    <h2 class="text-3xl font-bold text-blue-400 mb-6 text-center">
        📝 Crear Cuenta
    </h2>

    <form th:action="@{/register}" method="post" th:object="${user}" class="space-y-4">

        <input type="text" th:field="*{username}"
               placeholder="Usuario"
               class="w-full p-3 rounded-lg bg-black border border-blue-500 focus:outline-none">

        <input type="password" th:field="*{password}"
               placeholder="Contraseña"
               class="w-full p-3 rounded-lg bg-black border border-blue-500 focus:outline-none">

        <button type="submit"
                class="w-full bg-blue-500 p-3 rounded-lg hover:bg-blue-600 font-semibold">
            Registrarse
        </button>

    </form>

    <p class="mt-6 text-center text-gray-400">
        ¿Ya tienes cuenta?
        <a th:href="@{/login}" class="text-blue-400 hover:underline">
            Inicia sesión
        </a>
    </p>

</div>

</body>
</html>
