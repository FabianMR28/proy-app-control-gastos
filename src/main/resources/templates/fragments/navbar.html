<nav th:fragment="navbar"
     class="bg-[#1e293b] border-b border-[#334155]" xmlns:sec="http://www.w3.org/1999/xhtml">

    <div class="max-w-7xl mx-auto px-4">

        <div class="flex items-center justify-between h-16">

            <!-- Logo -->
            <a th:href="@{/dashboard}"
               class="text-xl font-bold text-blue-400 tracking-wide">
                FinanceApp
            </a>

            <!-- Links -->
            <div sec:authorize="isAuthenticated()"
                 class="hidden md:flex items-center gap-1">

                <a th:href="@{/dashboard}"
                   class="px-3 py-2 rounded-lg text-sm text-[#94a3b8] hover:text-white hover:bg-[#334155] transition-colors">
                    Dashboard
                </a>

                <a th:href="@{/accounts}"
                   class="px-3 py-2 rounded-lg text-sm text-[#94a3b8] hover:text-white hover:bg-[#334155] transition-colors">
                    Cuentas
                </a>

                <a th:href="@{/transactions}"
                   class="px-3 py-2 rounded-lg text-sm text-[#94a3b8] hover:text-white hover:bg-[#334155] transition-colors">
                    Movimientos
                </a>

                <a th:href="@{/transfers}"
                   class="px-3 py-2 rounded-lg text-sm text-[#94a3b8] hover:text-white hover:bg-[#334155] transition-colors">
                    Transferencias
                </a>

                <a th:href="@{/categories}"
                   class="px-3 py-2 rounded-lg text-sm text-[#94a3b8] hover:text-white hover:bg-[#334155] transition-colors">
                    Categorías
                </a>

                <a th:href="@{/budgets}"
                   class="px-3 py-2 rounded-lg text-sm text-[#94a3b8] hover:text-white hover:bg-[#334155] transition-colors">
                    Presupuestos
                </a>

                <a sec:authorize="hasRole('ADMIN')"
                   th:href="@{/admin}"
                   class="px-3 py-2 rounded-lg text-sm text-blue-400 hover:text-white hover:bg-[#334155] transition-colors">
                    Admin
                </a>

            </div>

            <!-- Usuario -->
            <div sec:authorize="isAuthenticated()"
                 class="flex items-center gap-3">

                <span class="text-sm text-[#94a3b8]"
                      sec:authentication="name">
                </span>

                <form th:action="@{/auth/logout}" method="post">
                    <input type="hidden"
                           th:name="${_csrf.parameterName}"
                           th:value="${_csrf.token}"/>

                    <button type="submit"
                            class="px-3 py-2 rounded-lg text-sm text-[#94a3b8] hover:text-white hover:bg-[#334155] transition-colors">
                        Cerrar sesión
                    </button>
                </form>

            </div>

        </div>

    </div>

</nav>
