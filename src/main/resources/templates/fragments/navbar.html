<nav th:fragment="navbar"
     class="bg-[#1e293b] border-b border-[#334155]"
     xmlns:sec="http://www.w3.org/1999/xhtml">

    <div class="max-w-7xl mx-auto px-4">

        <div class="flex items-center justify-between h-16">

            <!-- Logo -->
            <a th:href="@{/dashboard}"
               class="text-xl font-bold text-blue-400 tracking-wide">
                FinanceApp
            </a>

            <!-- Botón hamburguesa (mobile) -->
            <button id="menuBtn"
                    class="md:hidden text-[#94a3b8] hover:text-white focus:outline-none">
                ☰
            </button>

            <!-- Links desktop -->
            <div sec:authorize="isAuthenticated()"
                 class="hidden md:flex items-center gap-1">

                <a th:href="@{/dashboard}" class="nav-link">Dashboard</a>
                <a th:href="@{/accounts}" class="nav-link">Cuentas</a>
                <a th:href="@{/transactions}" class="nav-link">Movimientos</a>
                <a th:href="@{/transfers}" class="nav-link">Transferencias</a>
                <a th:href="@{/categories}" class="nav-link">Categorías</a>
                <a th:href="@{/budgets}" class="nav-link">Presupuestos</a>
                <a th:href="@{/reports/charts}" class="nav-link">Reportes</a>

                <a sec:authorize="hasRole('ADMIN')"
                   th:href="@{/admin}"
                   class="nav-link text-blue-400">
                    Admin
                </a>

            </div>

            <!-- Usuario desktop -->
            <div sec:authorize="isAuthenticated()"
                 class="hidden md:flex items-center gap-3">

                <span class="text-sm text-[#94a3b8]" sec:authentication="name"></span>

                <form th:action="@{/auth/logout}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                    <button type="submit"
                            class="px-3 py-2 rounded-lg text-sm text-[#94a3b8] hover:text-white hover:bg-[#334155]">
                        Cerrar sesión
                    </button>
                </form>

            </div>

        </div>

        <!-- MENU MOBILE -->
        <div id="mobileMenu"
             class="md:hidden hidden flex flex-col gap-2 pb-4">

            <a th:href="@{/dashboard}" class="mobile-link">Dashboard</a>
            <a th:href="@{/accounts}" class="mobile-link">Cuentas</a>
            <a th:href="@{/transactions}" class="mobile-link">Movimientos</a>
            <a th:href="@{/transfers}" class="mobile-link">Transferencias</a>
            <a th:href="@{/categories}" class="mobile-link">Categorías</a>
            <a th:href="@{/budgets}" class="mobile-link">Presupuestos</a>
            <a th:href="@{/reports/charts}" class="mobile-link">Reportes</a>

            <a sec:authorize="hasRole('ADMIN')"
               th:href="@{/admin}"
               class="mobile-link text-blue-400">
                Admin
            </a>

            <div sec:authorize="isAuthenticated()"
                 class="pt-2 border-t border-[#334155]">

                <span class="text-sm text-[#94a3b8]" sec:authentication="name"></span>

                <form th:action="@{/auth/logout}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                    <button type="submit"
                            class="mt-2 w-full text-left px-3 py-2 rounded-lg text-sm text-[#94a3b8] hover:text-white hover:bg-[#334155]">
                        Cerrar sesión
                    </button>
                </form>

            </div>

        </div>

    </div>

    <!-- JS toggle -->
    <script>
        const btn = document.getElementById("menuBtn");
        const menu = document.getElementById("mobileMenu");

        btn.addEventListener("click", () => {
            menu.classList.toggle("hidden");
        });
    </script>

    <!-- estilos reutilizables -->
    <style>
        .nav-link {
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 14px;
            color: #94a3b8;
            transition: 0.2s;
        }

        .nav-link:hover {
            color: white;
            background: #334155;
        }

        .mobile-link {
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 14px;
            color: #94a3b8;
        }

        .mobile-link:hover {
            color: white;
            background: #334155;
        }
    </style>

</nav>
