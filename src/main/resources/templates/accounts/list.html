<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Cuentas</title>
</head>
<body>
<div layout:fragment="content">

    <!-- Header -->
    <div class="flex items-center justify-between mb-8">
        <div>
            <h1 class="text-2xl font-bold">Mis cuentas</h1>
            <p class="text-[#94a3b8] text-sm mt-1">Gestiona tus cuentas bancarias y de efectivo</p>
        </div>
        <a th:href="@{/accounts/new}"
           class="px-4 py-2 rounded-lg bg-blue-700 hover:bg-blue-600 text-white text-sm font-semibold transition-colors">
            + Nueva cuenta
        </a>
    </div>

    <!-- Sin cuentas -->
    <div th:if="${#lists.isEmpty(accounts)}"
         class="bg-[#1e293b] rounded-2xl border border-[#334155] p-12 text-center">
        <p class="text-[#94a3b8] text-sm">No tienes cuentas registradas.</p>
        <a th:href="@{/accounts/new}"
           class="inline-block mt-4 px-4 py-2 rounded-lg bg-blue-700 hover:bg-blue-600 text-white text-sm font-semibold transition-colors">
            Crear primera cuenta
        </a>
    </div>

    <!-- Grid de cuentas -->
    <div th:unless="${#lists.isEmpty(accounts)}"
         class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
        <div th:each="acc : ${accounts}"
             class="bg-[#1e293b] rounded-2xl border border-[#334155] p-6 flex flex-col gap-4">

            <!-- Nombre y tipo -->
            <div class="flex items-center justify-between">
                <div>
                    <p class="font-semibold text-white" th:text="${acc.name}"></p>
                    <p class="text-xs text-[#94a3b8] mt-0.5" th:text="${acc.type}"></p>
                </div>
                <span class="text-xs px-2 py-1 rounded-full bg-blue-900/40 text-blue-300 border border-blue-800"
                      th:text="${acc.currency}"></span>
            </div>

            <!-- Saldo -->
            <div>
                <p class="text-[#94a3b8] text-xs mb-1">Saldo actual</p>
                <p class="text-2xl font-bold text-white"
                   th:text="${'S/ ' + #numbers.formatDecimal(acc.balance, 1, 2)}"></p>
            </div>

            <!-- Acciones -->
            <div class="flex items-center gap-2 pt-2 border-t border-[#334155]">
                <a th:href="@{/accounts/{id}/edit(id=${acc.id})}"
                   class="flex-1 text-center px-3 py-2 rounded-lg text-sm text-[#94a3b8] hover:text-white
                          hover:bg-[#334155] transition-colors">
                    Editar
                </a>
                <form th:action="@{/accounts/{id}/delete(id=${acc.id})}" method="post" class="flex-1">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit"
                            onclick="return confirm('¿Estás seguro de eliminar esta cuenta?')"
                            class="w-full px-3 py-2 rounded-lg text-sm text-red-400 hover:text-white
                                   hover:bg-red-900/40 transition-colors">
                        Eliminar
                    </button>
                </form>
            </div>

        </div>
    </div>

</div>
</body>
</html>
