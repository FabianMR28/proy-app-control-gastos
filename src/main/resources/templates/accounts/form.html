<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Cuenta</title>
</head>
<body>
<div layout:fragment="content">

    <!-- Header -->
    <div class="mb-8">
        <h1 class="text-2xl font-bold"
            th:text="${account.id != null} ? 'Editar cuenta' : 'Nueva cuenta'"></h1>
        <p class="text-[#94a3b8] text-sm mt-1">Completa los datos de la cuenta</p>
    </div>

    <!-- Card -->
    <div class="max-w-lg bg-[#1e293b] rounded-2xl border border-[#334155] p-8">

        <form th:action="${account.id != null} ? @{/accounts/{id}/edit(id=${account.id})} : @{/accounts/new}"
              method="post" th:object="${account}" class="space-y-5">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <!-- Nombre -->
            <div>
                <label for="name" class="block text-sm text-[#94a3b8] mb-1">Nombre de la cuenta</label>
                <input type="text" id="name" th:field="*{name}" required
                       class="w-full px-4 py-2.5 rounded-lg bg-[#0f172a] border border-[#334155] text-[#e2e8f0]
                              placeholder-[#475569] focus:outline-none focus:border-blue-500 transition-colors text-sm"
                       placeholder="Ej: Cuenta BCP, Efectivo"/>
            </div>

            <!-- Tipo -->
            <div>
                <label for="type" class="block text-sm text-[#94a3b8] mb-1">Tipo de cuenta</label>
                <select id="type" th:field="*{type}" required
                        class="w-full px-4 py-2.5 rounded-lg bg-[#0f172a] border border-[#334155] text-[#e2e8f0]
                               focus:outline-none focus:border-blue-500 transition-colors text-sm">
                    <option value="" disabled>Selecciona un tipo</option>
                    <option th:each="type : ${accountTypes}"
                            th:value="${type}"
                            th:text="${type}"></option>
                </select>
            </div>

            <!-- Saldo inicial -->
            <div>
                <label for="balance" class="block text-sm text-[#94a3b8] mb-1">Saldo inicial</label>
                <input type="number" id="balance" th:field="*{balance}" step="0.01" min="0"
                       class="w-full px-4 py-2.5 rounded-lg bg-[#0f172a] border border-[#334155] text-[#e2e8f0]
                              placeholder-[#475569] focus:outline-none focus:border-blue-500 transition-colors text-sm"
                       placeholder="0.00"/>
            </div>

            <!-- Moneda -->
            <div>
                <label for="currency" class="block text-sm text-[#94a3b8] mb-1">Moneda</label>
                <select id="currency" th:field="*{currency}"
                        class="w-full px-4 py-2.5 rounded-lg bg-[#0f172a] border border-[#334155] text-[#e2e8f0]
                               focus:outline-none focus:border-blue-500 transition-colors text-sm">
                    <option value="PEN">PEN - Sol peruano</option>
                    <option value="USD">USD - Dólar</option>
                    <option value="EUR">EUR - Euro</option>
                </select>
            </div>

            <!-- Botones -->
            <div class="flex gap-3 pt-2">
                <a th:href="@{/accounts}"
                   class="flex-1 text-center px-4 py-2.5 rounded-lg border border-[#334155] text-[#94a3b8]
                          hover:text-white hover:bg-[#334155] transition-colors text-sm font-semibold">
                    Cancelar
                </a>
                <button type="submit"
                        class="flex-1 px-4 py-2.5 rounded-lg bg-blue-700 hover:bg-blue-600 text-white
                               font-semibold transition-colors text-sm">
                    <span th:text="${account.id != null} ? 'Guardar cambios' : 'Crear cuenta'"></span>
                </button>
            </div>

        </form>
    </div>

</div>
</body>
</html>
