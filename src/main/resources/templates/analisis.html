<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Análisis</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white min-h-screen p-6">

<div class="max-w-6xl mx-auto">

  <h1 class="text-3xl text-blue-400 mb-6">📊 Análisis Financiero</h1>

  <!-- CARDS -->
  <div class="grid grid-cols-3 gap-4 mb-6">

    <div class="bg-gray-900 p-4 rounded border border-blue-500">
      <h2>Total Gastos</h2>
      <p class="text-red-400 text-xl"
         th:text="'S/ ' + ${#numbers.formatDecimal(total,1,2)}"></p>
    </div>

    <div class="bg-gray-900 p-4 rounded border border-blue-500">
      <h2>Gastos del Mes</h2>
      <p class="text-yellow-400 text-xl"
         th:text="'S/ ' + ${#numbers.formatDecimal(mes,1,2)}"></p>
    </div>

    <div class="bg-gray-900 p-4 rounded border border-blue-500">
      <h2>Gastos de la Semana</h2>
      <p class="text-green-400 text-xl"
         th:text="'S/ ' + ${#numbers.formatDecimal(semana,1,2)}"></p>
    </div>

  </div>

  <!-- CATEGORIA TOP -->
  <div class="bg-gray-900 p-4 rounded border border-blue-500 mb-6">
    <h2 class="text-blue-400">Categoría con más gasto</h2>
    <p th:if="${categoriaTop != null}">
      <span th:text="${categoriaTop.key}"></span> →
      <span th:text="'S/ ' + ${#numbers.formatDecimal(categoriaTop.value,1,2)}"></span>
    </p>
  </div>

  <!-- TABLA COMPARATIVA -->
  <div class="bg-gray-900 p-4 rounded border border-blue-500 mb-6">
    <h2 class="text-blue-400 mb-2">Gastos por categoría</h2>

    <table class="w-full">
      <tr th:each="cat : ${categorias}">
        <td th:text="${cat.key}"></td>
        <td th:text="'S/ ' + ${#numbers.formatDecimal(cat.value,1,2)}"></td>
      </tr>
    </table>
  </div>

  <!-- ESTADO -->
  <div class="bg-gray-900 p-4 rounded border border-blue-500">
    <h2 class="text-blue-400">Estado financiero</h2>
    <p class="text-xl"
       th:text="${estado}"></p>
  </div>

  <div class="mt-6">
    <a href="/" class="text-blue-400">← Volver</a>
  </div>

</div>

</body>
</html>
