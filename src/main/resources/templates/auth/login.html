<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Iniciar sesión | FinanceApp</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-[#0f172a] text-[#e2e8f0] min-h-screen flex items-center justify-center font-sans">

<div class="w-full max-w-md px-4">

    <!-- Logo -->
    <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-blue-400">FinanceApp</h1>
        <p class="text-[#94a3b8] text-sm mt-2">Controla tus finanzas personales</p>
    </div>

    <!-- Card -->
    <div class="bg-[#1e293b] rounded-2xl border border-[#334155] p-8">

        <h2 class="text-xl font-semibold mb-6">Iniciar sesión</h2>

        <!-- Error de credenciales -->
        <div th:if="${param.error}"
             class="mb-4 px-4 py-3 rounded-lg bg-red-900/40 border border-red-700 text-red-300 text-sm">
            Correo o contraseña incorrectos.
        </div>

        <!-- Logout message -->
        <div th:if="${param.logout}"
             class="mb-4 px-4 py-3 rounded-lg bg-green-900/40 border border-green-700 text-green-300 text-sm">
            Sesión cerrada correctamente.
        </div>

        <!-- Registro exitoso -->
        <div th:if="${success}"
             class="mb-4 px-4 py-3 rounded-lg bg-green-900/40 border border-green-700 text-green-300 text-sm"
             th:text="${success}">
        </div>

        <form th:action="@{/auth/login}" method="post" class="space-y-5">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <!-- Email -->
            <div>
                <label for="email" class="block text-sm text-[#94a3b8] mb-1">Correo electrónico</label>
                <input type="email" id="email" name="email" required
                       class="w-full px-4 py-2.5 rounded-lg bg-[#0f172a] border border-[#334155] text-[#e2e8f0]
                                  placeholder-[#475569] focus:outline-none focus:border-blue-500 transition-colors text-sm"
                       placeholder="correo@ejemplo.com"/>
            </div>

            <!-- Password -->
            <div>
                <label for="password" class="block text-sm text-[#94a3b8] mb-1">Contraseña</label>
                <input type="password" id="password" name="password" required
                       class="w-full px-4 py-2.5 rounded-lg bg-[#0f172a] border border-[#334155] text-[#e2e8f0]
                                  placeholder-[#475569] focus:outline-none focus:border-blue-500 transition-colors text-sm"
                       placeholder="••••••••"/>
            </div>

            <!-- Submit -->
            <button type="submit"
                    class="w-full py-2.5 rounded-lg bg-blue-700 hover:bg-blue-600 text-white font-semibold
                               transition-colors text-sm">
                Ingresar
            </button>
        </form>

        <!-- Registro -->
        <p class="text-center text-sm text-[#94a3b8] mt-6">
            ¿No tienes cuenta?
            <a th:href="@{/auth/register}" class="text-blue-400 hover:text-blue-300 transition-colors">
                Regístrate
            </a>
        </p>

    </div>
</div>

</body>
</html>
