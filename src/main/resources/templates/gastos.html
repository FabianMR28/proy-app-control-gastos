<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>FinFlow</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white min-h-screen flex items-center justify-center">

<div class="w-screen h-screen bg-gray-900 p-8 rounded-2xl shadow-2xl border border-blue-500">

    <!-- HEADER -->
    <div class="flex justify-between items-center mb-6">
        <h1 class="text-3xl font-bold text-blue-400">💰 FinFlow</h1>

        <a href="/historial"
           class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition">
            📜 Historial
        </a>
        <a href="/analisis"
           class="bg-purple-600 px-4 py-2 rounded-lg hover:bg-purple-700 ml-2">
            📊 Análisis
        </a>

        <a href="/analisis1" class="bg-purple-600 px-4 py-2 rounded-lg mr-2">
            📊 Análisis 1
        </a>

        <a href="/analisis2" class="bg-indigo-600 px-4 py-2 rounded-lg">
            📊 Análisis 2
        </a>
    </div>

    <!-- SALDO -->
    <div class="bg-gray-800 p-4 rounded-xl mb-6 border border-green-500">
        <h2 class="text-xl font-semibold text-green-400">
            Saldo actual: S/
            <span th:text="${#numbers.formatDecimal(saldo,1,2)}"></span>
        </h2>
    </div>

    <!-- FORM SALDO -->
    <form action="/guardar-saldo" method="post" class="flex gap-2 mb-6">
        <input type="number" step="0.01" name="saldo"
               class="flex-1 p-2 bg-gray-800 border border-blue-500 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400 text-white"
               placeholder="Ingresar saldo inicial">
        <button class="bg-green-500 text-white px-4 py-2 rounded-lg hover:bg-green-600 transition">
            Guardar
        </button>
    </form>

    <!-- BOTON NUEVO -->
    <div class="mb-4">
        <a href="/nuevo"
           class="bg-blue-500 text-white px-4 py-2 rounded-lg hover:bg-blue-600 transition">
            + Nuevo Gasto
        </a>
    </div>

    <!-- TABLA -->
    <div class="overflow-x-auto">
        <table class="w-full border-collapse text-sm">

            <thead>
            <tr class="bg-gray-800 text-blue-400 border-b border-blue-500">
                <th class="p-3 text-left">ID</th>
                <th class="p-3 text-left">Descripción</th>
                <th class="p-3 text-left">Categoría</th>
                <th class="p-3 text-left">Monto</th>
                <th class="p-3 text-left">Fecha</th>
                <th class="p-3 text-left">Acciones</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="gasto : ${gastos}"
                class="border-b border-gray-800 hover:bg-gray-800 transition">

                <td class="p-3" th:text="${gasto.id}"></td>

                <td class="p-3" th:text="${gasto.descripcion}"></td>

                <td class="p-3">
                    <span class="bg-blue-600 px-2 py-1 rounded text-xs"
                          th:text="${gasto.categoria != null ? gasto.categoria.nombre : 'Sin categoría'}">
                    </span>
                </td>

                <td class="p-3 text-red-400 font-semibold"
                    th:text="'S/ ' + ${#numbers.formatDecimal(gasto.monto,1,2)}">
                </td>

                <td class="p-3 text-gray-400"
                    th:text="${#temporals.format(gasto.fecha, 'dd/MM/yyyy HH:mm')}">
                </td>

                <td class="p-3">
                    <a th:href="@{'/eliminar/' + ${gasto.id}}"
                       class="bg-red-500 text-white px-3 py-1 rounded-lg hover:bg-red-600 transition">
                        Eliminar
                    </a>
                </td>

            </tr>
            </tbody>

        </table>
    </div>

</div>

</body>
</html>
